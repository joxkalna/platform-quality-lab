version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      dev-dependencies:
        dependency-type: "development"
      production-dependencies:
        dependency-type: "production"

  - package-ecosystem: "npm"
    directory: "/services/service-a"
    schedule:
      interval: "weekly"
    groups:
      all-dependencies:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/services/service-b"
    schedule:
      interval: "weekly"
    groups:
      all-dependencies:
        patterns: ["*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
