name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          npm ci
          cd services/service-a && npm ci
          cd ../service-b && npm ci

      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            services/service-a/node_modules
            services/service-b/node_modules
          key: deps-${{ hashFiles('**/package-lock.json') }}

  lint:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            services/service-a/node_modules
            services/service-b/node_modules
          key: deps-${{ hashFiles('**/package-lock.json') }}

      - name: Lint
        run: npm run lint

  typecheck:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            services/service-a/node_modules
            services/service-b/node_modules
          key: deps-${{ hashFiles('**/package-lock.json') }}

      - name: Type check
        run: |
          npm run typecheck:a
          npm run typecheck:b
