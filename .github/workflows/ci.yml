name: CI

on:
  push:
    branches: [main, 'phase*/**']
  pull_request:
    branches: [main]

env:
  NODE_VERSION: 24
  KUBECONFORM_VERSION: 0.6.7
  KIND_VERSION: v0.27.0
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          npm ci
          cd services/service-a && npm ci
          cd ../service-b && npm ci
          cd ../service-c && npm ci
          cd ../../tests/load && npm ci

      - name: Cache node_modules
        uses: actions/cache/save@v5
        with:
          path: |
            node_modules
            services/service-a/node_modules
            services/service-b/node_modules
            services/service-c/node_modules
            tests/load/node_modules
          key: deps-${{ hashFiles('**/package-lock.json') }}

  lint:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            services/service-a/node_modules
            services/service-b/node_modules
            services/service-c/node_modules
          key: deps-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            deps-

      - name: Lint
        run: npm run lint

  typecheck:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            services/service-a/node_modules
            services/service-b/node_modules
            services/service-c/node_modules
          key: deps-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            deps-

      - name: Type check
        run: |
          npm run typecheck:a
          npm run typecheck:b
          npm run typecheck:c

  validate-k8s:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            services/service-a/node_modules
            services/service-b/node_modules
            services/service-c/node_modules
          key: deps-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            deps-

      - uses: yokawasa/action-setup-kube-tools@v0.13.4
        with:
          kubeconform: ${{ env.KUBECONFORM_VERSION }}

      - name: Validate K8s manifests (schema)
        run: kubeconform -strict -summary -ignore-filename-pattern validation-config.yaml k8s/

      - name: Validate K8s manifests (policy)
        run: npm run validate:manifests

  # Set PACT_ENABLED to false to skip (break-glass — see docs/pact/break-glass.md).
  pact:
    needs: install
    if: vars.PACT_ENABLED != 'false'
    uses: ./.github/workflows/pact.yml
    with:
      node-version: "24"
    secrets: inherit

  deploy-and-test:
    needs: [lint, typecheck, validate-k8s, pact]
    if: "!failure() && !cancelled()"
    uses: ./.github/workflows/deploy-and-test.yml
    with:
      node-version: "24"
      kind-version: "v0.27.0"
    secrets: inherit

  deploy-dashboard:
    needs: deploy-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dashboard/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
