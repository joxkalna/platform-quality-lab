name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: 24
  KUBECONFORM_VERSION: 0.6.7
  KIND_VERSION: v0.27.0
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          npm ci
          cd services/service-a && npm ci
          cd ../service-b && npm ci

      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            services/service-a/node_modules
            services/service-b/node_modules
          key: deps-${{ hashFiles('**/package-lock.json') }}

  lint:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            services/service-a/node_modules
            services/service-b/node_modules
          key: deps-${{ hashFiles('**/package-lock.json') }}

      - name: Lint
        run: npm run lint

  typecheck:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            services/service-a/node_modules
            services/service-b/node_modules
          key: deps-${{ hashFiles('**/package-lock.json') }}

      - name: Type check
        run: |
          npm run typecheck:a
          npm run typecheck:b

  validate-k8s:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            services/service-a/node_modules
            services/service-b/node_modules
          key: deps-${{ hashFiles('**/package-lock.json') }}

      - uses: yokawasa/action-setup-kube-tools@v0.12.0
        with:
          kubeconform: ${{ env.KUBECONFORM_VERSION }}

      - name: Validate K8s manifests (schema)
        run: kubeconform -strict -summary -ignore-filename-pattern validation-config.yaml k8s/

      - name: Validate K8s manifests (policy)
        run: npm run validate:manifests

  # Pact contract tests — runs against persistent PactFlow Broker
  pact:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            services/service-a/node_modules
            services/service-b/node_modules
          key: deps-${{ hashFiles('**/package-lock.json') }}

      - name: Create .env from secrets
        run: |
          echo "PACT_BROKER_BASE_URL=${{ secrets.PACT_BROKER_BASE_URL }}" >> .env
          echo "PACT_BROKER_TOKEN=${{ secrets.PACT_BROKER_TOKEN }}" >> .env

      - name: Run consumer pact tests
        run: npm run test:pact

      - name: Publish pacts to Broker
        run: bash scripts/pact/publish.sh
        env:
          CI: "true"

      - name: Run provider verification
        run: npm run test:pact:verify
        env:
          CI: "true"

      - name: Can-i-deploy + record deployment
        run: bash scripts/pact/can-i-deploy.sh
        env:
          CI: "true"

  # Kind cluster deploy + infrastructure/integration tests
  deploy-and-test:
    needs: [lint, typecheck, validate-k8s, pact]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            services/service-a/node_modules
            services/service-b/node_modules
          key: deps-${{ hashFiles('**/package-lock.json') }}

      - name: Install Kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/${{ env.KIND_VERSION }}/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Create Kind cluster
        run: kind create cluster --name platform-lab --config kind-config.yaml

      - name: Build Docker images
        run: |
          docker build -t service-a:latest services/service-a
          docker build -t service-b:latest services/service-b

      - name: Load images into Kind
        run: |
          kind load docker-image service-a:latest --name platform-lab
          kind load docker-image service-b:latest --name platform-lab
          docker pull alexeiled/stress-ng:latest
          kind load docker-image alexeiled/stress-ng:latest --name platform-lab
          kind load docker-image node:24-alpine --name platform-lab

      - name: Deploy to Kind
        run: |
          kubectl apply -f k8s/service-b.yaml
          kubectl apply -f k8s/service-a.yaml
          kubectl rollout status deployment/service-b --timeout=60s
          kubectl rollout status deployment/service-a --timeout=60s

      # --- Infrastructure tests (BATS) ---

      - name: Install BATS
        run: |
          sudo apt-get update && sudo apt-get install -y bats jq

      - name: Run infrastructure tests
        run: npm run test:infra

      # --- Integration tests (Vitest) ---

      - name: Run integration tests
        run: npm run test:integration

      # --- Chaos experiments ---
      # In a real org, chaos runs as a downstream pipeline against staging.
      # It triggers after deploy succeeds, runs independently, and reports
      # results via dashboard/Slack. Prod promotion doesn't wait for it.
      # Here we run inline because the Kind cluster is ephemeral to this job.

      - name: Run chaos — pod kill
        run: |
          ./scripts/chaos/pod-kill.sh service-a
          ./scripts/chaos/pod-kill.sh service-b

      - name: Run chaos — dependency failure
        run: ./scripts/chaos/dependency-failure.sh

      - name: Run chaos — resource pressure (CPU only — OOM tested locally)
        run: ./scripts/chaos/resource-pressure.sh service-a cpu

      - name: Run chaos — latency injection
        run: ./scripts/chaos/latency-injection.sh

      - name: Chaos experiment summary
        if: always()
        run: ./scripts/chaos/render-summary.sh >> $GITHUB_STEP_SUMMARY

      - name: Upload chaos reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chaos-reports
          path: scripts/chaos/reports/
          if-no-files-found: ignore

      # --- Teardown ---

      - name: Delete Kind cluster
        if: always()
        run: kind delete cluster --name platform-lab
