name: CI

on:
  push:
    branches: [main, 'phase*/**']
  pull_request:
    branches: [main]

env:
  NODE_VERSION: 24
  KUBECONFORM_VERSION: 0.6.7
  KIND_VERSION: v0.27.0
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          npm ci
          cd services/service-a && npm ci
          cd ../service-b && npm ci
          cd ../service-c && npm ci

      - name: Cache node_modules
        uses: actions/cache/save@v5
        with:
          path: |
            node_modules
            services/service-a/node_modules
            services/service-b/node_modules
            services/service-c/node_modules
          key: deps-${{ hashFiles('**/package-lock.json') }}

  lint:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            services/service-a/node_modules
            services/service-b/node_modules
            services/service-c/node_modules
          key: deps-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            deps-

      - name: Lint
        run: npm run lint

  typecheck:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            services/service-a/node_modules
            services/service-b/node_modules
            services/service-c/node_modules
          key: deps-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            deps-

      - name: Type check
        run: |
          npm run typecheck:a
          npm run typecheck:b
          npm run typecheck:c

  validate-k8s:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            services/service-a/node_modules
            services/service-b/node_modules
            services/service-c/node_modules
          key: deps-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            deps-

      - uses: yokawasa/action-setup-kube-tools@v0.13.4
        with:
          kubeconform: ${{ env.KUBECONFORM_VERSION }}

      - name: Validate K8s manifests (schema)
        run: kubeconform -strict -summary -ignore-filename-pattern validation-config.yaml k8s/

      - name: Validate K8s manifests (policy)
        run: npm run validate:manifests

  # Pact contract tests — build & test stage.
  # Runs consumer tests, publishes pacts, verifies provider.
  # Does NOT run can-i-deploy or record-deployment — those belong
  # in the deploy stage (deploy-and-test job) so that verification
  # failure doesn't block deployment recording.
  # Set PACT_ENABLED to false to skip (break-glass — see docs/pact/break-glass.md).
  pact:
    needs: install
    if: vars.PACT_ENABLED != 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            services/service-a/node_modules
            services/service-b/node_modules
            services/service-c/node_modules
          key: deps-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            deps-

      - name: Create .env from secrets
        run: |
          echo "PACT_BROKER_BASE_URL=${{ secrets.PACT_BROKER_BASE_URL }}" >> .env
          echo "PACT_BROKER_TOKEN=${{ secrets.PACT_BROKER_TOKEN }}" >> .env

      - name: Run consumer pact tests
        run: npm run test:pact

      - name: Publish pacts to Broker
        run: bash scripts/pact/publish.sh
        env:
          CI: "true"

      - name: Run provider verification
        run: npm run test:pact:verify
        env:
          CI: "true"

  # Kind cluster deploy + infrastructure/integration tests.
  # This is the slowest job in the pipeline. Future optimisations:
  # TODO: Docker layer caching — use docker/setup-buildx-action + cache mounts
  #       so only changed services rebuild (biggest win)
  # TODO: Ollama model caching — cache llama3.2:1b between runs instead of
  #       pulling every time (~30-60s saved)
  # TODO: Chaos only on main — skip chaos experiments on feature branches,
  #       run only after merge. In a real org, chaos runs as a downstream
  #       pipeline against a QA/staging environment, not dev. It triggers
  #       after a successful deploy, runs independently, and reports results
  #       via dashboard/Slack. Prod promotion doesn't gate on it — chaos
  #       validates resilience over time, not per-commit correctness.
  deploy-and-test:
    needs: [lint, typecheck, validate-k8s, pact]
    if: always() && needs.lint.result == 'success' && needs.typecheck.result == 'success' && needs.validate-k8s.result == 'success' && (needs.pact.result == 'success' || needs.pact.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            services/service-a/node_modules
            services/service-b/node_modules
            services/service-c/node_modules
          key: deps-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            deps-

      - name: Install Kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/${{ env.KIND_VERSION }}/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Create Kind cluster
        run: kind create cluster --name platform-lab --config kind-config.yaml

      - name: Build Docker images
        run: |
          docker build -t service-a:latest services/service-a
          docker build -t service-b:latest services/service-b
          docker build -t service-c:latest services/service-c

      - name: Load images into Kind
        run: |
          kind load docker-image service-a:latest --name platform-lab
          kind load docker-image service-b:latest --name platform-lab
          kind load docker-image service-c:latest --name platform-lab
          docker pull alexeiled/stress-ng:latest
          docker pull node:24-alpine
          kind load docker-image alexeiled/stress-ng:latest --name platform-lab
          kind load docker-image node:24-alpine --name platform-lab

      - name: Start Ollama (host)
        run: |
          docker pull ollama/ollama:latest
          docker run -d --name ollama -p 11434:11434 ollama/ollama:latest
          sleep 5
          docker exec ollama ollama pull llama3.2:1b

      - name: Deploy to Kind
        run: |
          # Ollama runs on the CI host — get the host IP accessible from Kind pods
          HOST_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.Gateway}}{{end}}' platform-lab-control-plane)
          kubectl apply -f k8s/service-b.yaml
          kubectl apply -f k8s/service-a.yaml
          # Patch Service C to point at host Ollama instead of in-cluster
          sed "s|http://ollama:11434|http://${HOST_IP}:11434|" k8s/service-c.yaml | kubectl apply -f -
          kubectl rollout status deployment/service-b --timeout=60s
          kubectl rollout status deployment/service-a --timeout=60s
          kubectl rollout status deployment/service-c --timeout=120s

      # --- Pact deploy stage (can-i-deploy + record-deployment) ---
      # Runs after the actual deploy, separate from the pact job (build & test stage).
      # This matches the production pattern: verification failure in the pact job
      # doesn't block record-deployment here. Recovery after break-glass is a
      # single commit — no continue-on-error needed.

      - name: Create .env from secrets
        if: vars.PACT_ENABLED != 'false'
        run: |
          echo "PACT_BROKER_BASE_URL=${{ secrets.PACT_BROKER_BASE_URL }}" >> .env
          echo "PACT_BROKER_TOKEN=${{ secrets.PACT_BROKER_TOKEN }}" >> .env

      - name: Can-i-deploy + record deployment
        if: vars.PACT_ENABLED != 'false'
        run: bash scripts/pact/can-i-deploy.sh
        env:
          CI: "true"

      # --- Infrastructure tests (BATS) ---

      - name: Install BATS
        run: |
          sudo apt-get update && sudo apt-get install -y bats jq

      - name: Run infrastructure tests
        run: npm run test:infra

      # --- Integration tests (Vitest) ---

      - name: Run integration tests
        run: npm run test:integration

      # --- Chaos experiments ---
      # In a real org, chaos runs as a downstream pipeline against staging.
      # It triggers after deploy succeeds, runs independently, and reports
      # results via dashboard/Slack. Prod promotion doesn't wait for it.
      # Here we run inline because the Kind cluster is ephemeral to this job.

      - name: Run chaos — pod kill
        run: |
          ./scripts/chaos/pod-kill.sh service-a
          ./scripts/chaos/pod-kill.sh service-b

      - name: Run chaos — dependency failure
        run: ./scripts/chaos/dependency-failure.sh

      - name: Run chaos — resource pressure
        run: ./scripts/chaos/resource-pressure.sh service-a all

      - name: Run chaos — latency injection
        run: ./scripts/chaos/latency-injection.sh

      - name: Chaos experiment summary
        if: always()
        run: npx tsx scripts/chaos/render-summary.ts >> $GITHUB_STEP_SUMMARY

      - name: Upload chaos reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: chaos-reports
          path: scripts/chaos/reports/
          if-no-files-found: ignore

      # --- Teardown ---

      - name: Delete Kind cluster
        if: always()
        run: |
          kind delete cluster --name platform-lab
          docker rm -f ollama 2>/dev/null || true
